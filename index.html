<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>emirhanarslanonline</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial, Helvetica, sans-serif;
height:100vh;
color:white;
background:url('arka-plan.jpg') no-repeat center center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

.container{
position:relative;
z-index:2;
padding:20px;
max-width:1000px;
}

h1{
font-size:52px;
margin-bottom:15px;
letter-spacing:1px;
}

#motivation{
font-size:20px;
margin-bottom:35px;
opacity:0.9;
min-height:24px;
}

.countdown{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-bottom:30px;
}

.box{
background:rgba(0,0,0,0.70);
padding:30px;
border-radius:14px;
width:160px;
box-shadow:0 12px 30px rgba(0,0,0,0.5);
}

.number{
font-size:56px;
font-weight:bold;
}

.label{
font-size:18px;
margin-top:8px;
opacity:0.85;
}

#clock{
font-size:22px;
margin-top:15px;
opacity:0.95;
}

#tiny{
position:absolute;
bottom:40px;
right:12px;
font-size:11px;
opacity:0.7;
}

#footer{
position:absolute;
bottom:10px;
font-size:20px;
opacity:0.9;
}

@media(max-width:700px){

h1{font-size:34px}

.box{
width:110px;
padding:20px;
}

.number{font-size:36px}

.label{font-size:14px}

#clock{font-size:18px}

#footer{font-size:16px}

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<h1>LGS 2026' ya SON</h1>

<div id="motivation"></div>

<div class="countdown">

<div class="box">
<div class="number" id="days">0</div>
<div class="label">Gün</div>
</div>

<div class="box">
<div class="number" id="hours">0</div>
<div class="label">Saat</div>
</div>

<div class="box">
<div class="number" id="minutes">0</div>
<div class="label">Dakika</div>
</div>

<div class="box">
<div class="number" id="seconds">0</div>
<div class="label">Saniye</div>
</div>

</div>

<div id="clock"></div>

</div>

<div id="tiny">emirhan arslan hayratıdır</div>

<div id="footer">emirhanarslanonline</div>

<script>

const examDate = new Date("June 14, 2026 09:30:00").getTime();

function updateCountdown(){

const now = new Date().getTime();
const diff = examDate - now;

if(diff <= 0){

document.getElementById("days").innerHTML = "0";
document.getElementById("hours").innerHTML = "0";
document.getElementById("minutes").innerHTML = "0";
document.getElementById("seconds").innerHTML = "0";

document.getElementById("motivation").innerHTML = "SINAV BAŞLADI. BAŞARILAR.";

return;
}

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff % (1000*60*60))/(1000*60));
const seconds = Math.floor((diff % (1000*60))/1000);


document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

}

setInterval(updateCountdown,1000);

function updateClock(){

const now = new Date();
const time = now.toLocaleTimeString('tr-TR');

document.getElementById("clock").innerHTML = "Türkiye Saati: " + time;

}

setInterval(updateClock,1000);

updateCountdown();
updateClock();

const quotes = [
"Bugün çalışırsan yarın rahatlarsın.",
"Disiplin = başarı.",
"Her gün küçük bir adım büyük fark oluşturur.",
"LGS sadece bir sınav ama hazırlık karakter kazandırır.",
"Pes edenler değil, devam edenler kazanır.",
"Odaklan. Çalış. Başar."
];

let q = 0;

function rotateQuote(){

document.getElementById("motivation").innerHTML = quotes[q];

q++;

if(q >= quotes.length) q = 0;

}

rotateQuote();

setInterval(rotateQuote,5000);

</script>

</body>
</html>
