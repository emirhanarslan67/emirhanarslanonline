<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>emirhanarslanonline</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
width:100vw;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:black;
position:relative;
}

img{
max-width:100%;
max-height:100%;
object-fit:contain;
display:block;
}

#text{
position:absolute;
bottom:70px;
width:100%;
text-align:center;
font-size:36px;
font-family:"Brush Script MT", cursive;
color:black;
}

#clock{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
font-size:28px;
color:#00ffcc;
font-family:monospace;
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,255,200,0.7);
letter-spacing:2px;
}

@media(max-width:700px){
#text{
font-size:22px;
}
#clock{
font-size:18px;
padding:8px 14px;
}
}

</style>

</head>

<body>

<img src="foto.jpg">

<div id="clock"></div>

<script>
function updateClock(){
const now = new Date();
const time = now.toLocaleTimeString('tr-TR');
document.getElementById("clock").innerHTML = time;
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
