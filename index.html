<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>emirhanarslanonline</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
width:100vw;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:black;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:contain;
opacity:0;
transform:scale(1.05);
transition:opacity 1s ease, transform 10s linear;
}

.active{
opacity:1;
transform:scale(1);
}

#text{
position:absolute;
bottom:35px;
width:100%;
text-align:center;
font-size:34px;
font-family:Arial, Helvetica, sans-serif; /* düz font */
color:black;
font-weight:bold;
}

#subtext{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
font-size:16px;
font-family:Arial, Helvetica, sans-serif;
color:black;
opacity:0.8;
}

.dots{
position:absolute;
bottom:80px;
width:100%;
text-align:center;
}

.dot{
display:inline-block;
width:10px;
height:10px;
margin:5px;
background:white;
border-radius:50%;
opacity:0.5;
}

.dot.active-dot{
opacity:1;
background:#00ffcc;
}

@media(max-width:700px){
#text{font-size:22px;}
#subtext{font-size:12px;}
}

</style>
</head>

<body>

<!-- SLAYTLAR -->
<img src="foto1.jpg" class="slide active">
<img src="foto2.jpg" class="slide">
<img src="foto3.jpg" class="slide">
<img src="foto4.jpg" class="slide">
<img src="foto5.jpg" class="slide">
<img src="foto6.jpg" class="slide">
<img src="foto7.jpg" class="slide">
<img src="foto8.jpg" class="slide">
<img src="foto9.jpg" class="slide">
<img src="foto10.jpg" class="slide">

<!-- DOT GÖSTERGE -->
<div class="dots">
<span class="dot active-dot"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<div id="text">Yakuplu Öğrenci Yurdu</div>
<div id="subtext">@emirhanarslanonline</div>

<script>

const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");
let index = 0;

function changeSlide(){
slides[index].classList.remove("active");
dots[index].classList.remove("active-dot");
index++;
if(index >= slides.length){ index = 0; }
slides[index].classList.add("active");
dots[index].classList.add("active-dot");
}


function autoSlide(){
  changeSlide();

  let delay = (index < 6) ? 15000 : 25000;

  setTimeout(autoSlide, delay);
}

setTimeout(autoSlide, 15000);

// SWIPE (mobil)
let startX = 0;

document.addEventListener("touchstart", e => {
startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
let endX = e.changedTouches[0].clientX;
if(startX - endX > 50){ changeSlide(); }
if(endX - startX > 50){
index -= 2;
if(index < -1) index = slides.length - 2;
changeSlide();
}
});

</script>

</body>
</html>
